name: Aktualizacja DartLiga do 1.3.1

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-v1.3.1.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4

      - name: Zaktualizuj licznik lotka po lotce
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path

          app_path = Path("app.js")
          css_path = Path("styles.css")
          index_path = Path("index.html")
          sw_path = Path("sw.js")

          required_files = [
              app_path,
              css_path,
              index_path,
              sw_path,
          ]

          missing = [str(path) for path in required_files if not path.exists()]

          if missing:
              raise SystemExit(
                  "Brakuje wymaganych plików: " + ", ".join(missing)
              )

          def replace_once(text, old, new, description):
              if new in text:
                  print(f"Pomijam — zmiana już istnieje: {description}")
                  return text

              if old not in text:
                  raise SystemExit(
                      f"Nie znaleziono fragmentu: {description}"
                  )

              print(f"Wprowadzam zmianę: {description}")
              return text.replace(old, new, 1)

          app = app_path.read_text(encoding="utf-8")

          # ============================================================
          # 1. Numer wersji aplikacji
          # ============================================================

          app = replace_once(
              app,
              "const APP_VERSION = '1.3.0';",
              "const APP_VERSION = '1.3.1';",
              "numer wersji aplikacji",
          )

          # ============================================================
          # 2. Zapamiętywanie wybranego numeru pola
          # ============================================================

          old_normalization = """      pendingDarts: Array.isArray(competition.live.pendingDarts) ? competition.live.pendingDarts : [],
                pendingMultiplier: ['S','D','T'].includes(competition.live.pendingMultiplier) ? competition.live.pendingMultiplier : 'S'"""

          new_normalization = """      pendingDarts: Array.isArray(competition.live.pendingDarts) ? competition.live.pendingDarts : [],
                pendingSegment:
                  Number.isInteger(Number(competition.live.pendingSegment)) &&
                  Number(competition.live.pendingSegment) >= 1 &&
                  Number(competition.live.pendingSegment) <= 20
                    ? Number(competition.live.pendingSegment)
                    : null,
                pendingMultiplier: ['S','D','T'].includes(competition.live.pendingMultiplier) ? competition.live.pendingMultiplier : 'S'"""

          app = replace_once(
              app,
              old_normalization,
              new_normalization,
              "obsługa wybranego numeru po ponownym otwarciu aplikacji",
          )

          # ============================================================
          # 3. Zmienna selectedSegment w widoku licznika
          # ============================================================

          old_pending_section = """  const pending = live.pendingDarts || [];
            const locked = evaluation.bust || evaluation.checkout || pending.length >= 3;"""

          new_pending_section = """  const pending = live.pendingDarts || [];
            const selectedSegment =
              Number.isInteger(Number(live.pendingSegment)) &&
              Number(live.pendingSegment) >= 1 &&
              Number(live.pendingSegment) <= 20
                ? Number(live.pendingSegment)
                : null;
            const locked = evaluation.bust || evaluation.checkout || pending.length >= 3;"""

          app = replace_once(
              app,
              old_pending_section,
              new_pending_section,
              "wyświetlanie aktualnie wybranego numeru",
          )

          # ============================================================
          # 4. Nowa kolejność:
          #    numer pola -> Singiel / Double / Triple
          # ============================================================

          old_controls = r'''            <div class="multiplier-picker" aria-label="Wybierz mnożnik">
                ${[['S','Singiel'],['D','Double'],['T','Triple']].map(([code,label])=>`<button type="button" class="multiplier-btn ${live.pendingMultiplier===code?'active':''}" data-multiplier="${code}" ${locked?'disabled':''}><b>${code}</b><span>${label}</span></button>`).join('')}
              </div>

              <div class="dart-number-grid" aria-label="Wybierz pole tarczy">
                ${Array.from({length:20},(_,i)=>i+1).map(value=>`<button type="button" class="dart-number" data-segment="${value}" ${locked?'disabled':''}>${value}</button>`).join('')}
              </div>
              <div class="dart-special-grid">
                <button type="button" class="dart-special" data-special="S25" ${locked?'disabled':''}><b>25</b><span>Outer Bull</span></button>
                <button type="button" class="dart-special" data-special="DBULL" ${locked?'disabled':''}><b>50</b><span>Bull</span></button>
                <button type="button" class="dart-special miss" data-special="MISS" ${locked?'disabled':''}><b>0</b><span>Pudło</span></button>
              </div>'''

          new_controls = r'''            <div class="dart-step-head">
                <span>1</span>
                <div>
                  <strong>Wybierz numer pola</strong>
                  <small>Najpierw wybierz numer od 1 do 20.</small>
                </div>
              </div>

              <div class="dart-number-grid" aria-label="Wybierz numer pola">
                ${Array.from({length:20},(_,i)=>i+1).map(value=>`
                  <button
                    type="button"
                    class="dart-number ${selectedSegment===value?'selected':''}"
                    data-segment="${value}"
                    ${locked?'disabled':''}
                  >${value}</button>
                `).join('')}
              </div>

              <div class="dart-step-head second-step">
                <span>2</span>
                <div>
                  <strong>Wybierz rodzaj trafienia</strong>
                  <small>
                    ${selectedSegment
                      ? `Wybrane pole: ${selectedSegment}`
                      : 'Najpierw wybierz numer pola.'}
                  </small>
                </div>
              </div>

              <div class="multiplier-picker" aria-label="Wybierz rodzaj trafienia">
                ${[
                  ['S','Singiel',1],
                  ['D','Double',2],
                  ['T','Triple',3]
                ].map(([code,label,multiplier])=>`
                  <button
                    type="button"
                    class="multiplier-btn"
                    data-multiplier="${code}"
                    ${locked||!selectedSegment?'disabled':''}
                  >
                    <b>${code}</b>
                    <span>
                      ${selectedSegment
                        ? `${label}: ${selectedSegment * multiplier} pkt`
                        : label}
                    </span>
                  </button>
                `).join('')}
              </div>

              <div class="dart-special-label">Bull lub pudło</div>

              <div class="dart-special-grid">
                <button type="button" class="dart-special" data-special="S25" ${locked?'disabled':''}>
                  <b>25</b>
                  <span>Outer Bull</span>
                </button>

                <button type="button" class="dart-special" data-special="DBULL" ${locked?'disabled':''}>
                  <b>50</b>
                  <span>Bull</span>
                </button>

                <button type="button" class="dart-special miss" data-special="MISS" ${locked?'disabled':''}>
                  <b>0</b>
                  <span>Pudło</span>
                </button>
              </div>'''

          app = replace_once(
              app,
              old_controls,
              new_controls,
              "nowa kolejność wyboru lotki",
          )

          # ============================================================
          # 5. Aktywność przycisków cofania i czyszczenia
          # ============================================================

          app = app.replace(
              """id="undoDart" ${pending.length?'':'disabled'}""",
              """id="undoDart" ${(pending.length||selectedSegment)?'':'disabled'}""",
          )

          app = app.replace(
              """id="clearDarts" ${pending.length?'':'disabled'}""",
              """id="clearDarts" ${(pending.length||selectedSegment)?'':'disabled'}""",
          )

          # ============================================================
          # 6. Instrukcja pod licznikiem
          # ============================================================

          old_note = """Wybierz Singiel, Double albo Triple, a następnie numer pola. Bull i pudło mają osobne przyciski. Przy checkout liczba użytych lotek jest liczona automatycznie. Obowiązuje zakończenie na double lub Bull 50."""

          new_note = """Najpierw wybierz numer pola, a następnie Singiel, Double albo Triple. Po trzeciej lotce wizyta zostanie zapisana automatycznie. Checkout lub BUST również kończą wizytę automatycznie. Przed zapisaniem możesz cofnąć lotkę albo wyczyścić bieżącą wizytę."""

          app = replace_once(
              app,
              old_note,
              new_note,
              "instrukcja obsługi licznika",
          )

          # ============================================================
          # 7. Zmiana obsługi kliknięć
          # ============================================================

          old_bindings = """  $$('.multiplier-btn').forEach(b=>b.addEventListener('click',()=>selectDartMultiplier(b.dataset.multiplier)));
            $$('.dart-number').forEach(b=>b.addEventListener('click',()=>addPendingDart(Number(b.dataset.segment))));"""

          new_bindings = """  $$('.multiplier-btn').forEach(b=>b.addEventListener('click',()=>addPendingDart(b.dataset.multiplier)));
            $$('.dart-number').forEach(b=>b.addEventListener('click',()=>selectDartSegment(Number(b.dataset.segment))));"""

          app = replace_once(
              app,
              old_bindings,
              new_bindings,
              "obsługa kliknięć numeru i mnożnika",
          )

          # ============================================================
          # 8. Nowa logika dodawania lotki
          #
          # Automatyczny zapis następuje:
          # - po trzeciej lotce,
          # - po checkout,
          # - po BUST.
          # ============================================================

          old_functions = """function selectDartMultiplier(multiplier) {
            const live=state.live;if(!live||!['S','D','T'].includes(multiplier))return;
            const evaluation=evaluatePendingVisit(live);
            if(evaluation.bust||evaluation.checkout||(live.pendingDarts||[]).length>=3)return;
            live.pendingMultiplier=multiplier;saveState();render();
          }

          function addPendingDart(segment) {
            const live=state.live;if(!live)return;
            const evaluation=evaluatePendingVisit(live);
            if(evaluation.bust||evaluation.checkout||(live.pendingDarts||[]).length>=3)return;
            const value=Number(segment);if(!Number.isInteger(value)||value<1||value>20)return;
            live.pendingDarts=live.pendingDarts||[];
            live.pendingDarts.push(dartFromParts(value,live.pendingMultiplier||'S'));
            saveState();render();
          }

          function addSpecialDart(code) {
            const live=state.live;if(!live)return;
            const evaluation=evaluatePendingVisit(live);
            if(evaluation.bust||evaluation.checkout||(live.pendingDarts||[]).length>=3)return;
            live.pendingDarts=live.pendingDarts||[];
            live.pendingDarts.push(specialDart(code));
            saveState();render();
          }"""

          new_functions = """function selectDartSegment(segment) {
            const live = state.live;

            if (!live) return;

            const evaluation = evaluatePendingVisit(live);

            if (
              evaluation.bust ||
              evaluation.checkout ||
              (live.pendingDarts || []).length >= 3
            ) return;

            const value = Number(segment);

            if (
              !Number.isInteger(value) ||
              value < 1 ||
              value > 20
            ) return;

            live.pendingSegment = value;

            saveState();
            render();
          }

          function autoSubmitPendingVisit() {
            const live = state.live;

            if (!live) return false;

            const evaluation = evaluatePendingVisit(live);
            const dartsCount = (live.pendingDarts || []).length;

            const shouldSubmit =
              evaluation.bust ||
              evaluation.checkout ||
              dartsCount >= 3;

            if (!shouldSubmit) return false;

            /*
             * Najpierw zapisujemy i odświeżamy widok, aby trzecia lotka
             * była widoczna także wtedy, gdy użytkownik anuluje
             * potwierdzenie końca meczu.
             */
            saveState();
            render();

            setTimeout(() => {
              submitScore({
                preventDefault() {}
              });
            }, 0);

            return true;
          }

          function addPendingDart(multiplier) {
            const live = state.live;

            if (
              !live ||
              !['S','D','T'].includes(multiplier)
            ) return;

            const evaluation = evaluatePendingVisit(live);

            if (
              evaluation.bust ||
              evaluation.checkout ||
              (live.pendingDarts || []).length >= 3
            ) return;

            const value = Number(live.pendingSegment);

            if (
              !Number.isInteger(value) ||
              value < 1 ||
              value > 20
            ) {
              return toast('Najpierw wybierz numer pola');
            }

            live.pendingDarts = live.pendingDarts || [];
            live.pendingDarts.push(
              dartFromParts(value, multiplier)
            );

            live.pendingSegment = null;

            if (autoSubmitPendingVisit()) return;

            saveState();
            render();
          }

          function addSpecialDart(code) {
            const live = state.live;

            if (!live) return;

            const evaluation = evaluatePendingVisit(live);

            if (
              evaluation.bust ||
              evaluation.checkout ||
              (live.pendingDarts || []).length >= 3
            ) return;

            live.pendingDarts = live.pendingDarts || [];
            live.pendingSegment = null;
            live.pendingDarts.push(
              specialDart(code)
            );

            if (autoSubmitPendingVisit()) return;

            saveState();
            render();
          }"""

          app = replace_once(
              app,
              old_functions,
              new_functions,
              "nowa logika dodawania i automatycznego zapisu wizyty",
          )

          # ============================================================
          # 9. Cofnięcie wybranego numeru lub ostatniej lotki
          # ============================================================

          old_undo_dart = """function undoPendingDart() {
            const live=state.live;if(!live?.pendingDarts?.length)return;
            live.pendingDarts.pop();saveState();render();
          }"""

          new_undo_dart = """function undoPendingDart() {
            const live = state.live;

            if (!live) return;

            if (
              live.pendingSegment !== null &&
              live.pendingSegment !== undefined
            ) {
              live.pendingSegment = null;
              saveState();
              render();
              return;
            }

            if (!live.pendingDarts?.length) return;

            live.pendingDarts.pop();

            saveState();
            render();
          }"""

          app = replace_once(
              app,
              old_undo_dart,
              new_undo_dart,
              "cofanie wybranego numeru lub lotki",
          )

          # ============================================================
          # 10. Czyszczenie całej bieżącej wizyty
          # ============================================================

          old_clear = """function clearPendingDarts() {
            const live=state.live;if(!live)return;
            live.pendingDarts=[];saveState();render();
          }"""

          new_clear = """function clearPendingDarts() {
            const live = state.live;

            if (!live) return;

            live.pendingDarts = [];
            live.pendingSegment = null;

            saveState();
            render();
          }"""

          app = replace_once(
              app,
              old_clear,
              new_clear,
              "czyszczenie niezapisanej wizyty",
          )

          # ============================================================
          # 11. Czyszczenie wyboru po zapisaniu wizyty
          # ============================================================

          old_after_submit = """  live.pendingDarts=[];
            live.pendingMultiplier='S';"""

          new_after_submit = """  live.pendingDarts=[];
            live.pendingSegment=null;
            live.pendingMultiplier='S';"""

          app = replace_once(
              app,
              old_after_submit,
              new_after_submit,
              "czyszczenie numeru po zatwierdzeniu wizyty",
          )

          # ============================================================
          # 12. Nowo rozpoczynane mecze
          # ============================================================

          old_new_match = """pendingDarts:[],pendingMultiplier:'S',startedAt:new Date().toISOString()"""

          new_new_match = """pendingDarts:[],pendingSegment:null,pendingMultiplier:'S',startedAt:new Date().toISOString()"""

          app = replace_once(
              app,
              old_new_match,
              new_new_match,
              "pole pendingSegment w nowych meczach",
          )

          app_path.write_text(app, encoding="utf-8")

          # ============================================================
          # 13. Style interfejsu
          # ============================================================

          css = css_path.read_text(encoding="utf-8")

          css_marker = "/* Dart scorer v1.3.1 – number first */"

          if css_marker not in css:
              css += r'''

          /* Dart scorer v1.3.1 – number first */

          .dart-step-head{
            display:flex;
            align-items:center;
            gap:10px;
            margin:12px 0 9px;
          }

          .dart-step-head.second-step{
            margin-top:16px;
          }

          .dart-step-head>span{
            width:30px;
            height:30px;
            flex:0 0 30px;
            display:grid;
            place-items:center;
            border-radius:50%;
            background:var(--info);
            color:#082f49;
            font-weight:950;
          }

          .dart-step-head>div{
            display:grid;
            gap:2px;
          }

          .dart-step-head strong{
            font-size:14px;
          }

          .dart-step-head small{
            color:var(--muted);
            font-size:11px;
          }

          .dart-number.selected{
            border-color:var(--primary);
            background:rgba(34,197,94,.2);
            color:#dcfce7;
            box-shadow:0 0 0 3px rgba(34,197,94,.12);
          }

          .dart-special-label{
            margin-top:14px;
            color:var(--muted);
            font-size:11px;
            font-weight:900;
            text-transform:uppercase;
            letter-spacing:.08em;
          }
          '''

              css_path.write_text(css, encoding="utf-8")
              print("Dodano style wersji 1.3.1")
          else:
              print("Style wersji 1.3.1 już istnieją")

          # ============================================================
          # 14. Wersje plików w index.html
          # ============================================================

          index = index_path.read_text(encoding="utf-8")
          index = index.replace("v=1.3.0", "v=1.3.1")
          index_path.write_text(index, encoding="utf-8")

          # ============================================================
          # 15. Nowy cache Service Workera
          # ============================================================

          sw = sw_path.read_text(encoding="utf-8")
          sw = sw.replace(
              "dartliga-pwa-v1.3.0",
              "dartliga-pwa-v1.3.1",
          )
          sw = sw.replace(
              "v=1.3.0",
              "v=1.3.1",
          )
          sw_path.write_text(sw, encoding="utf-8")

          print("")
          print("Aktualizacja DartLiga 1.3.1 została przygotowana.")
          print("Kolejność: numer -> Singiel/Double/Triple.")
          print("Trzecia lotka automatycznie zapisuje wizytę.")
          print("Checkout i BUST również zapisują wizytę automatycznie.")
          PY

      - name: Sprawdź składnię JavaScript
        run: node --check app.js

      - name: Pokaż zmienione pliki
        run: git status --short

      - name: Zapisz zmiany w repozytorium
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add app.js styles.css index.html sw.js

          if git diff --cached --quiet; then
            echo "Nie wykryto nowych zmian."
          else
            git commit -m "DartLiga 1.3.1 - numer przed mnożnikiem i automatyczny zapis wizyty"
            git push
          fi
