name: Publikacja DartLiga PWA

on:
  push:
    branches:
      - main
    paths:
      - "app.js"
      - "styles.css"
      - "index.html"
      - "sw.js"
      - "manifest.webmanifest"
      - "icons/**"
      - ".github/workflows/deploy-pages.yml"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Publikacja strony

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Pobierz pliki repozytorium
        uses: actions/checkout@v6

      - name: Skonfiguruj GitHub Pages
        uses: actions/configure-pages@v5

      - name: Przygotuj pliki strony
        uses: actions/upload-pages-artifact@v4
        with:
          path: .
          include-hidden-files: true

      - name: Opublikuj aplikację
        id: deployment
        uses: actions/deploy-pages@v4
