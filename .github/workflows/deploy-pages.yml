name: Aktualizacja i publikacja DartLiga 1.3.1

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Zaktualizuj licznik DartLiga
        shell: bash
        run: |
          python <<'PY'
          from pathlib import Path
          import re

          app_path = Path("app.js")
          css_path = Path("styles.css")
          index_path = Path("index.html")
          sw_path = Path("sw.js")

          required_files = [
              app_path,
              css_path,
              index_path,
              sw_path,
          ]

          missing_files = [
              str(path)
              for path in required_files
              if not path.exists()
          ]

          if missing_files:
              raise SystemExit(
                  "Brakuje wymaganych plików: "
                  + ", ".join(missing_files)
              )

          app = app_path.read_text(encoding="utf-8")

          def replace_required(old, new, description):
              global app

              if new in app:
                  print(f"Zmiana już istnieje: {description}")
                  return

              if old not in app:
                  raise SystemExit(
                      f"Nie znaleziono fragmentu: {description}"
                  )

              app = app.replace(old, new, 1)
              print(f"Wprowadzono zmianę: {description}")

          def regex_replace_required(
              pattern,
              replacement,
              description,
              flags=re.DOTALL,
          ):
              global app

              updated, count = re.subn(
                  pattern,
                  replacement,
                  app,
                  count=1,
                  flags=flags,
              )

              if count != 1:
                  raise SystemExit(
                      f"Nie znaleziono sekcji: {description}"
                  )

              app = updated
              print(f"Wprowadzono zmianę: {description}")

          # ==========================================================
          # 1. Numer wersji
          # ==========================================================

          app, version_count = re.subn(
              r"const APP_VERSION = '1\.3\.\d+';",
              "const APP_VERSION = '1.3.1';",
              app,
              count=1,
          )

          if version_count != 1:
              raise SystemExit(
                  "Nie znaleziono numeru wersji APP_VERSION"
              )

          print("Ustawiono wersję aplikacji 1.3.1")

          # ==========================================================
          # 2. Normalizacja wybranego numeru po ponownym otwarciu
          # ==========================================================

          if "Number(competition.live.pendingSegment)" not in app:
              old_normalization = """      pendingDarts: Array.isArray(competition.live.pendingDarts) ? competition.live.pendingDarts : [],
                pendingMultiplier: ['S','D','T'].includes(competition.live.pendingMultiplier) ? competition.live.pendingMultiplier : 'S'"""

              new_normalization = """      pendingDarts: Array.isArray(competition.live.pendingDarts) ? competition.live.pendingDarts : [],
                pendingSegment:
                  Number.isInteger(Number(competition.live.pendingSegment)) &&
                  Number(competition.live.pendingSegment) >= 1 &&
                  Number(competition.live.pendingSegment) <= 20
                    ? Number(competition.live.pendingSegment)
                    : null,
                pendingMultiplier: ['S','D','T'].includes(competition.live.pendingMultiplier) ? competition.live.pendingMultiplier : 'S'"""

              replace_required(
                  old_normalization,
                  new_normalization,
                  "zapamiętywanie wybranego numeru pola",
              )

          # ==========================================================
          # 3. Wybrany numer w renderScorer()
          # ==========================================================

          if "const selectedSegment =" not in app:
              old_pending = """  const pending = live.pendingDarts || [];
            const locked = evaluation.bust || evaluation.checkout || pending.length >= 3;"""

              new_pending = """  const pending = live.pendingDarts || [];
            const selectedSegment =
              Number.isInteger(Number(live.pendingSegment)) &&
              Number(live.pendingSegment) >= 1 &&
              Number(live.pendingSegment) <= 20
                ? Number(live.pendingSegment)
                : null;
            const locked = evaluation.bust || evaluation.checkout || pending.length >= 3;"""

              replace_required(
                  old_pending,
                  new_pending,
                  "wyświetlanie wybranego numeru pola",
              )

          # ==========================================================
          # 4. Interfejs: najpierw numer, potem mnożnik
          # ==========================================================

          if 'class="dart-step-head"' not in app:
              controls_pattern = r'''
                <div\ class="multiplier-picker"
                \ aria-label="Wybierz\ mnożnik">
                .*?
                (?=
                  \s*<div\ class="dart-actions">
                )
              '''

              controls_replacement = r'''            <div class="dart-step-head">
                <span>1</span>
                <div>
                  <strong>Wybierz numer pola</strong>
                  <small>Najpierw wybierz numer od 1 do 20.</small>
                </div>
              </div>

              <div class="dart-number-grid" aria-label="Wybierz numer pola">
                ${Array.from({length:20},(_,i)=>i+1).map(value=>`
                  <button
                    type="button"
                    class="dart-number ${selectedSegment===value?'selected':''}"
                    data-segment="${value}"
                    ${locked?'disabled':''}
                  >
                    ${value}
                  </button>
                `).join('')}
              </div>

              <div class="dart-step-head second-step">
                <span>2</span>
                <div>
                  <strong>Wybierz rodzaj trafienia</strong>
                  <small>
                    ${selectedSegment
                      ? `Wybrane pole: ${selectedSegment}`
                      : 'Najpierw wybierz numer pola.'}
                  </small>
                </div>
              </div>

              <div class="multiplier-picker" aria-label="Wybierz rodzaj trafienia">
                ${[
                  ['S','Singiel',1],
                  ['D','Double',2],
                  ['T','Triple',3]
                ].map(([code,label,multiplier])=>`
                  <button
                    type="button"
                    class="multiplier-btn"
                    data-multiplier="${code}"
                    ${locked||!selectedSegment?'disabled':''}
                  >
                    <b>${code}</b>
                    <span>
                      ${selectedSegment
                        ? `${label}: ${selectedSegment * multiplier} pkt`
                        : label}
                    </span>
                  </button>
                `).join('')}
              </div>

              <div class="dart-special-label">
                Bull lub pudło
              </div>

              <div class="dart-special-grid">
                <button
                  type="button"
                  class="dart-special"
                  data-special="S25"
                  ${locked?'disabled':''}
                >
                  <b>25</b>
                  <span>Outer Bull</span>
                </button>

                <button
                  type="button"
                  class="dart-special"
                  data-special="DBULL"
                  ${locked?'disabled':''}
                >
                  <b>50</b>
                  <span>Bull</span>
                </button>

                <button
                  type="button"
                  class="dart-special miss"
                  data-special="MISS"
                  ${locked?'disabled':''}
                >
                  <b>0</b>
                  <span>Pudło</span>
                </button>
              </div>

'''

              regex_replace_required(
                  controls_pattern,
                  controls_replacement,
                  "nowa kolejność wyboru lotki",
                  flags=re.DOTALL | re.VERBOSE,
              )

          # ==========================================================
          # 5. Przyciski cofania i czyszczenia
          # ==========================================================

          app = app.replace(
              """id="undoDart" ${pending.length?'':'disabled'}""",
              """id="undoDart" ${(pending.length||selectedSegment)?'':'disabled'}""",
          )

          app = app.replace(
              """id="clearDarts" ${pending.length?'':'disabled'}""",
              """id="clearDarts" ${(pending.length||selectedSegment)?'':'disabled'}""",
          )

          # ==========================================================
          # 6. Instrukcja pod licznikiem
          # ==========================================================

          old_instruction = (
              "Wybierz Singiel, Double albo Triple, "
              "a następnie numer pola. Bull i pudło mają "
              "osobne przyciski. Przy checkout liczba użytych "
              "lotek jest liczona automatycznie. Obowiązuje "
              "zakończenie na double lub Bull 50."
          )

          new_instruction = (
              "Najpierw wybierz numer pola, a następnie "
              "Singiel, Double albo Triple. Po trzeciej lotce "
              "wizyta zostanie zapisana automatycznie. "
              "Checkout lub BUST również zapisują wizytę "
              "automatycznie. Przed trzecią lotką możesz "
              "cofnąć ostatnią lotkę albo wyczyścić wizytę."
          )

          if new_instruction not in app:
              if old_instruction not in app:
                  raise SystemExit(
                      "Nie znaleziono instrukcji licznika"
                  )

              app = app.replace(
                  old_instruction,
                  new_instruction,
                  1,
              )

              print("Zmieniono instrukcję licznika")

          # ==========================================================
          # 7. Obsługa kliknięć
          # ==========================================================

          if (
              "selectDartSegment(Number(b.dataset.segment))"
              not in app
          ):
              old_bindings = """  $$('.multiplier-btn').forEach(b=>b.addEventListener('click',()=>selectDartMultiplier(b.dataset.multiplier)));
            $$('.dart-number').forEach(b=>b.addEventListener('click',()=>addPendingDart(Number(b.dataset.segment))));"""

              new_bindings = """  $$('.multiplier-btn').forEach(b=>b.addEventListener('click',()=>addPendingDart(b.dataset.multiplier)));
            $$('.dart-number').forEach(b=>b.addEventListener('click',()=>selectDartSegment(Number(b.dataset.segment))));"""

              replace_required(
                  old_bindings,
                  new_bindings,
                  "obsługa wyboru numeru i mnożnika",
              )

          # ==========================================================
          # 8. Nowa logika wprowadzania lotek
          # ==========================================================

          if "function autoSubmitPendingVisit()" not in app:
              functions_pattern = r'''
                function\ selectDartMultiplier
                \(multiplier\)
                \s*\{
                .*?
                (?=
                  function\ undoPendingDart\(\)
                )
              '''

              functions_replacement = r'''function selectDartSegment(segment) {
            const live = state.live;

            if (!live) return;

            const evaluation = evaluatePendingVisit(live);

            if (
              evaluation.bust ||
              evaluation.checkout ||
              (live.pendingDarts || []).length >= 3
            ) {
              return;
            }

            const value = Number(segment);

            if (
              !Number.isInteger(value) ||
              value < 1 ||
              value > 20
            ) {
              return;
            }

            live.pendingSegment = value;

            saveState();
            render();
          }

          function autoSubmitPendingVisit() {
            const live = state.live;

            if (!live) return false;

            const evaluation = evaluatePendingVisit(live);
            const dartsCount = (
              live.pendingDarts || []
            ).length;

            const shouldSubmit =
              evaluation.bust ||
              evaluation.checkout ||
              dartsCount >= 3;

            if (!shouldSubmit) {
              return false;
            }

            /*
             * Najpierw zapisujemy aktualny stan i odświeżamy
             * ekran. Następnie automatycznie zatwierdzamy
             * przygotowaną wizytę.
             */
            saveState();
            render();

            setTimeout(() => {
              submitScore({
                preventDefault() {}
              });
            }, 0);

            return true;
          }

          function addPendingDart(multiplier) {
            const live = state.live;

            if (
              !live ||
              !['S','D','T'].includes(multiplier)
            ) {
              return;
            }

            const evaluation = evaluatePendingVisit(live);

            if (
              evaluation.bust ||
              evaluation.checkout ||
              (live.pendingDarts || []).length >= 3
            ) {
              return;
            }

            const value = Number(live.pendingSegment);

            if (
              !Number.isInteger(value) ||
              value < 1 ||
              value > 20
            ) {
              return toast(
                'Najpierw wybierz numer pola'
              );
            }

            live.pendingDarts =
              live.pendingDarts || [];

            live.pendingDarts.push(
              dartFromParts(value, multiplier)
            );

            live.pendingSegment = null;

            if (autoSubmitPendingVisit()) {
              return;
            }

            saveState();
            render();
          }

          function addSpecialDart(code) {
            const live = state.live;

            if (!live) return;

            const evaluation = evaluatePendingVisit(live);

            if (
              evaluation.bust ||
              evaluation.checkout ||
              (live.pendingDarts || []).length >= 3
            ) {
              return;
            }

            live.pendingDarts =
              live.pendingDarts || [];

            live.pendingSegment = null;

            live.pendingDarts.push(
              specialDart(code)
            );

            if (autoSubmitPendingVisit()) {
              return;
            }

            saveState();
            render();
          }

          '''

              regex_replace_required(
                  functions_pattern,
                  functions_replacement,
                  "logika wyboru i automatycznego zapisu lotek",
                  flags=re.DOTALL | re.VERBOSE,
              )

          # ==========================================================
          # 9. Cofnij ostatnią lotkę lub wybrany numer
          # ==========================================================

          undo_new_marker = (
              "live.pendingSegment !== null &&"
          )

          if undo_new_marker not in app:
              undo_pattern = r'''
                function\ undoPendingDart\(\)
                \s*\{
                .*?
                \n\}
              '''

              undo_replacement = r'''function undoPendingDart() {
            const live = state.live;

            if (!live) return;

            if (
              live.pendingSegment !== null &&
              live.pendingSegment !== undefined
            ) {
              live.pendingSegment = null;

              saveState();
              render();

              return;
            }

            if (!live.pendingDarts?.length) {
              return;
            }

            live.pendingDarts.pop();

            saveState();
            render();
          }'''

              regex_replace_required(
                  undo_pattern,
                  undo_replacement,
                  "cofnięcie numeru albo lotki",
                  flags=re.DOTALL | re.VERBOSE,
              )

          # ==========================================================
          # 10. Wyczyść bieżącą wizytę
          # ==========================================================

          clear_new_marker = (
              "live.pendingDarts = [];\n"
              "  live.pendingSegment = null;"
          )

          if clear_new_marker not in app:
              clear_pattern = r'''
                function\ clearPendingDarts\(\)
                \s*\{
                .*?
                \n\}
              '''

              clear_replacement = r'''function clearPendingDarts() {
            const live = state.live;

            if (!live) return;

            live.pendingDarts = [];
            live.pendingSegment = null;

            saveState();
            render();
          }'''

              regex_replace_required(
                  clear_pattern,
                  clear_replacement,
                  "czyszczenie bieżącej wizyty",
                  flags=re.DOTALL | re.VERBOSE,
              )

          # ==========================================================
          # 11. Wyczyść numer po zapisaniu wizyty
          # ==========================================================

          if (
              "live.pendingDarts=[];\n"
              "  live.pendingSegment=null;"
              not in app
          ):
              old_after_submit = """  live.pendingDarts=[];
            live.pendingMultiplier='S';"""

              new_after_submit = """  live.pendingDarts=[];
            live.pendingSegment=null;
            live.pendingMultiplier='S';"""

              replace_required(
                  old_after_submit,
                  new_after_submit,
                  "czyszczenie numeru po zapisaniu wizyty",
              )

          # ==========================================================
          # 12. Nowe mecze
          # ==========================================================

          if (
              "pendingDarts:[],pendingSegment:null,"
              not in app
          ):
              old_new_match = (
                  "pendingDarts:[],"
                  "pendingMultiplier:'S',"
                  "startedAt:new Date().toISOString()"
              )

              new_new_match = (
                  "pendingDarts:[],"
                  "pendingSegment:null,"
                  "pendingMultiplier:'S',"
                  "startedAt:new Date().toISOString()"
              )

              replace_required(
                  old_new_match,
                  new_new_match,
                  "wybrany numer w nowych meczach",
              )

          # ==========================================================
          # 13. Kontrola efektu aktualizacji
          # ==========================================================

          expected_fragments = [
              "const APP_VERSION = '1.3.1';",
              "function selectDartSegment(segment)",
              "function autoSubmitPendingVisit()",
              "live.pendingSegment = value;",
              "if (autoSubmitPendingVisit())",
              'class="dart-number ${selectedSegment===value',
              "Po trzeciej lotce wizyta zostanie zapisana automatycznie",
          ]

          missing_fragments = [
              fragment
              for fragment in expected_fragments
              if fragment not in app
          ]

          if missing_fragments:
              raise SystemExit(
                  "Aktualizacja nie została ukończona. "
                  "Brakuje: "
                  + " | ".join(missing_fragments)
              )

          app_path.write_text(
              app,
              encoding="utf-8",
          )

          # ==========================================================
          # 14. Style
          # ==========================================================

          css = css_path.read_text(encoding="utf-8")

          css_marker = (
              "/* Dart scorer v1.3.1 – number first */"
          )

          if css_marker not in css:
              css += r'''

          /* Dart scorer v1.3.1 – number first */

          .dart-step-head{
            display:flex;
            align-items:center;
            gap:10px;
            margin:12px 0 9px;
          }

          .dart-step-head.second-step{
            margin-top:16px;
          }

          .dart-step-head>span{
            width:30px;
            height:30px;
            flex:0 0 30px;
            display:grid;
            place-items:center;
            border-radius:50%;
            background:var(--info);
            color:#082f49;
            font-weight:950;
          }

          .dart-step-head>div{
            display:grid;
            gap:2px;
          }

          .dart-step-head strong{
            font-size:14px;
          }

          .dart-step-head small{
            color:var(--muted);
            font-size:11px;
          }

          .dart-number.selected{
            border-color:var(--primary);
            background:rgba(34,197,94,.2);
            color:#dcfce7;
            box-shadow:
              0 0 0 3px rgba(34,197,94,.12);
          }

          .dart-special-label{
            margin-top:14px;
            color:var(--muted);
            font-size:11px;
            font-weight:900;
            text-transform:uppercase;
            letter-spacing:.08em;
          }
          '''

              css_path.write_text(
                  css,
                  encoding="utf-8",
              )

              print("Dodano style wersji 1.3.1")
          else:
              print("Style wersji 1.3.1 już istnieją")

          # ==========================================================
          # 15. Odświeżenie index.html
          # ==========================================================

          index = index_path.read_text(
              encoding="utf-8"
          )

          index = re.sub(
              r"styles\.css\?v=1\.3\.\d+",
              "styles.css?v=1.3.1",
              index,
          )

          index = re.sub(
              r"app\.js\?v=1\.3\.\d+",
              "app.js?v=1.3.1",
              index,
          )

          index_path.write_text(
              index,
              encoding="utf-8",
          )

          # ==========================================================
          # 16. Nowy cache Service Workera
          # ==========================================================

          sw = sw_path.read_text(
              encoding="utf-8"
          )

          sw = re.sub(
              r"dartliga-pwa-v1\.3\.\d+",
              "dartliga-pwa-v1.3.1",
              sw,
          )

          sw = re.sub(
              r"styles\.css\?v=1\.3\.\d+",
              "styles.css?v=1.3.1",
              sw,
          )

          sw = re.sub(
              r"app\.js\?v=1\.3\.\d+",
              "app.js?v=1.3.1",
              sw,
          )

          sw_path.write_text(
              sw,
              encoding="utf-8",
          )

          print("")
          print("======================================")
          print("DartLiga 1.3.1 została przygotowana.")
          print("Numer -> Singiel / Double / Triple")
          print("Trzecia lotka zapisuje wizytę.")
          print("Checkout i BUST zapisują wizytę.")
          print("======================================")
          PY

      - name: Sprawdź składnię JavaScript
        run: node --check app.js

      - name: Pokaż zmienione pliki
        run: git status --short

      - name: Zapisz aktualizację w repozytorium
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add app.js styles.css index.html sw.js

          if git diff --cached --quiet; then
            echo "Pliki są już zaktualizowane."
          else
            git commit -m "DartLiga 1.3.1 - poprawa licznika"
            git push
          fi

      - name: Skonfiguruj GitHub Pages
        uses: actions/configure-pages@v5

      - name: Przygotuj pliki strony
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Opublikuj GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
