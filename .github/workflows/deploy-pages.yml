name: Publikacja DartLiga PWA

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v6

      - name: Skonfiguruj GitHub Pages
        uses: actions/configure-pages@v5

      - name: Przygotuj pliki strony
        run: |
          mkdir -p _site/icons
          cp index.html styles.css app.js manifest.webmanifest sw.js .nojekyll _site/
          cp icons/*.png _site/icons/

      - name: Prześlij pliki GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

      - name: Opublikuj stronę
        id: deployment
        uses: actions/deploy-pages@v4
